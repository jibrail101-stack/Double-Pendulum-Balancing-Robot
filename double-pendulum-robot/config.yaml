cart:
  mass: 1.0        # M (kg)  — limit: > 0; should be ≥ m1+m2 for stable dynamics

link1:
  mass: 1.5       # m1 (kg) — limit: > 0
  length: 1.5     # l1 (m)  — limit: > 0; sets the scale of the whole system

link2:
  mass: 0.25       # m2 (kg) — limit: > 0
  length: 0.5     # l2 (m)  — limit: > 0; CRITICAL: l2/l1 must be ≥ 0.2 for swing-up
                  #            to work (below this, I₂ is too small for energy pump)

physics:
  g: 9.81           # gravitational acceleration (m/s^2) — limit: > 0

integrator:
  dt: 0.005         # timestep (s) — limit: 0 < dt ≤ 0.010 (≥ 100 Hz required by FR-02;
                    #                RK4 becomes unstable above ~0.02 s for this system)

# ── auto-computed ─────────────────────────────────────────────────────────────
# Regenerated by:  python update_config.py
derived:
  I1:        0.28125      # m1 * l1^2 / 12  (kg·m²)
  I2:        0.005208      # m2 * l2^2 / 12  (kg·m²)
  sample_hz: 200      # 1 / dt           (Hz)
